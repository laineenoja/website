<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Tee tilaus</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: #1c1c1c;
  padding: 25px;
  border-radius: 10px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 15px;
}

.header img {
  height: 50px;
  width: 50px;
  object-fit: cover;
  border-radius: 50%;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

/* Uusi tyyli esittelytekstille */
.intro-text {
  font-size: 14px;
  line-height: 1.5;
  color: #ccc;
  margin-bottom: 25px;
  border-bottom: 1px solid #333;
  padding-bottom: 15px;
}

/* Uusi tyyli labeleille */
label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
  font-size: 14px;
  color: #ddd;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  box-sizing: border-box; /* Varmistaa että padding ei riko leveyttä */
}

.checkbox-group {
  margin-bottom: 15px;
  font-size: 14px;
  display: flex; /* Varmistaa että checkbox ja teksti ovat linjassa */
  align-items: flex-start;
}

.checkbox-group input {
  width: auto;
  margin-right: 10px;
  margin-top: 3px;
}

button {
  width: 100%;
  padding: 12px;
  background: #00c853;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s;
}

/* Tyyli napille kun se on disabloitu */
button:disabled {
  background: #555;
  cursor: not-allowed;
  color: #aaa;
}

#status {
  margin-top: 15px;
  text-align: center;
  min-height: 20px; /* Estää sivun hyppimisen kun teksti ilmestyy */
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="https://raw.githubusercontent.com/laineenoja/website/refs/heads/main/AIVAN_Logo2.png" alt="AIVAN Logo">
    <h1>AIVAN SOUND</h1>
  </div>

  <p class="intro-text">
    Tee uniikki kappale itsellesi tai lahjaksi! Anna sanoitusten tulla sinusta tai läheisestäsi ja anna tekoälyn luoda juuri sinun tyylisi mukainen, räätälöity musiikkielämys. Helppo, nopea ja täysin oma.
  </p>

  <form id="orderForm">

    <label for="name">Nimi</label>
    <input type="text" id="name" name="name" placeholder="Esim. Matti Meikäläinen" required>

    <label for="email">Sähköposti</label>
    <input type="email" id="email" name="email" placeholder="nimi@esimerkki.fi" required>

    <label for="songName">Kappaleen nimi</label>
    <input type="text" id="songName" name="songName" placeholder="Kappaleen nimi" required>

    <label for="genre">Tyyli / Genre</label>
    <select id="genre" name="genre" required>
      <option value="">Valitse genre</option>
      <option>Pop</option>
      <option>Rock</option>
      <option>Rap</option>
      <option>Iskelmä</option>
      <option>Muu</option>
    </select>

    <label for="lyrics">Sanoitukset / ideat</label>
    <textarea id="lyrics" name="lyrics" rows="5" placeholder="Kerro mistä kappale kertoo tai liitä valmiit sanat..."></textarea>

    <div class="checkbox-group">
      <input type="checkbox" id="terms" name="terms" required>
      <label for="terms" style="font-weight: normal; margin: 0;">
        Hyväksyn ehdot: ymmärrän, että kappale tehdään tekoälyn avulla, tiedot tallennetaan ja ostan uniikin, räätälöidyn kappaleen.
      </label>
    </div>

    <button type="submit">Lähetä tilaus</button>

  </form>

  <div id="status"></div>
</div>

<script>
const form = document.getElementById("orderForm");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const submitBtn = form.querySelector('button[type="submit"]');
  const statusDiv = document.getElementById("status");

  // 1. Poistetaan nappi käytöstä ja vaihdetaan teksti
  submitBtn.disabled = true;
  submitBtn.innerText = "Lähetetään...";
  statusDiv.innerText = ""; // Tyhjennetään vanhat viestit

  const data = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbzHeFAKJwtLtxn9yus0tm8ZXQoVqtUB4H5IB9wSzifZ_BlYfwT0M4VGq8W08oM8zh3M/exec", {
    method: "POST",
    body: data
  })
  .then(response => response.text())
  .then(result => {
    statusDiv.innerText = "Tilaus lähetetty!";
    statusDiv.style.color = "#00c853"; // Vihreä teksti onnistuessa
    form.reset();
  })
  .catch(error => {
    statusDiv.innerText = "Virhe lähetyksessä. Yritä uudelleen.";
    statusDiv.style.color = "#ff5252"; // Punainen teksti virheessä
    console.error(error);
  })
  .finally(() => {
    // 2. Palautetaan nappi käyttöön riippumatta siitä onnistuiko vai epäonnistuiko
    submitBtn.disabled = false;
    submitBtn.innerText = "Lähetä tilaus";
  });
});
</script>

</body>
</html>
