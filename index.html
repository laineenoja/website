<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tee tilaus - AIVAN SOUND</title>

<style>
/* Nollaus ja box-model asetus */
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Hieman modernimpi fontti */
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: flex-start; /* Estää keskityksen venymisen pitkillä sivuilla */
  min-height: 100vh;
  margin: 0;
  padding: 20px; /* Pienempi padding mobiilia varten */
}

.container {
  width: 100%;
  max-width: 500px;
  background: #1c1c1c;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Hienovarainen varjo */
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.header img {
  height: 50px;
  width: 50px;
  object-fit: cover;
  border-radius: 50%;
}

.header h1 {
  margin: 0;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.intro-text {
  font-size: 15px;
  line-height: 1.6;
  color: #bbb;
  margin-bottom: 30px;
  border-bottom: 1px solid #333;
  padding-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 14px;
  color: #eee;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 18px;
  background: #2a2a2a;
  border: 1px solid #333;
  color: white;
  border-radius: 8px;
  font-size: 16px; /* 16px estää iOS:ää zoomaamasta inputtiin kirjoittaessa */
  transition: border-color 0.3s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #00c853;
}

.checkbox-group {
  margin-bottom: 20px;
  font-size: 14px;
  display: flex;
  align-items: flex-start;
  color: #ccc;
  line-height: 1.4;
}

.checkbox-group input {
  width: 20px;
  height: 20px;
  margin-right: 12px;
  margin-top: 0;
  flex-shrink: 0; /* Estää checkboxin litistymisen */
}

/* HINNASTO-OSIO */
.pricing-section {
  background: #252525;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 15px 20px;
  margin-top: 25px;
  margin-bottom: 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.pricing-label {
  font-size: 15px;
  color: #bbb;
}

.pricing-amount {
  font-size: 20px;
  font-weight: bold;
  color: #00c853;
}

button {
  width: 100%;
  padding: 14px;
  background: #00c853;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s, transform 0.1s;
}

button:hover {
  background: #00e676;
}

button:active {
  transform: scale(0.98);
}

button:disabled {
  background: #444;
  cursor: not-allowed;
  color: #888;
}

#status {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
  min-height: 24px;
}

/* Mobiilioptimointi */
@media (max-width: 480px) {
  body {
    padding: 10px;
  }
  .container {
    padding: 20px;
  }
  .header h1 {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="https://raw.githubusercontent.com/laineenoja/website/refs/heads/main/AIVAN_Logo2.png" alt="AIVAN Logo">
    <h1>AIVAN SOUND</h1>
  </div>

  <p class="intro-text">
    Tee uniikki kappale itsellesi tai lahjaksi! Anna sanoitusten tulla sinusta tai läheisestäsi ja anna tekoälyn luoda juuri sinun tyylisi mukainen, räätälöity musiikkielämys. Helppo, nopea ja täysin oma.
  </p>

  <form id="orderForm">

    <label for="name">Nimi</label>
    <input type="text" id="name" name="name" placeholder="Esim. Matti Meikäläinen" required>

    <label for="email">Sähköposti</label>
    <input type="email" id="email" name="email" placeholder="nimi@esimerkki.fi" required>

    <label for="songName">Kappaleen nimi</label>
    <input type="text" id="songName" name="songName" placeholder="Kappaleen nimi" required>

    <label for="genre">Tyyli / Genre</label>
    <select id="genre" name="genre" required>
      <option value="">Valitse genre</option>
      <option>Pop</option>
      <option>Rock</option>
      <option>Rap</option>
      <option>Iskelmä</option>
      <option>Muu</option>
    </select>

    <label for="lyrics">Sanoitukset / ideat</label>
    <textarea id="lyrics" name="lyrics" rows="5" placeholder="Kerro mistä kappale kertoo tai liitä valmiit sanat..."></textarea>

    <div class="checkbox-group">
      <input type="checkbox" id="terms" name="terms" required>
      <label for="terms">
        Hyväksyn ehdot: ymmärrän, että kappale tehdään tekoälyn avulla, tiedot tallennetaan ja ostan uniikin, räätälöidyn kappaleen.
      </label>
    </div>

    <div class="pricing-section">
      <span class="pricing-label">Kappaleen hinta</span>
      <span class="pricing-amount">20,00 €</span>
    </div>

    <button type="submit">Lähetä tilaus</button>

  </form>

  <div id="status"></div>
</div>

<script>
const form = document.getElementById("orderForm");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const submitBtn = form.querySelector('button[type="submit"]');
  const statusDiv = document.getElementById("status");

  // Estä tuplaklikkaus ja anna palautetta
  submitBtn.disabled = true;
  submitBtn.innerText = "Lähetetään...";
  statusDiv.innerText = "";

  const data = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbzHeFAKJwtLtxn9yus0tm8ZXQoVqtUB4H5IB9wSzifZ_BlYfwT0M4VGq8W08oM8zh3M/exec", {
    method: "POST",
    body: data
  })
  .then(response => response.text())
  .then(result => {
    statusDiv.innerText = "Tilaus lähetetty onnistuneesti!";
    statusDiv.style.color = "#00c853";
    form.reset();
  })
  .catch(error => {
    statusDiv.innerText = "Virhe lähetyksessä. Tarkista yhteys.";
    statusDiv.style.color = "#ff5252";
    console.error(error);
  })
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.innerText = "Lähetä tilaus";
  });
});
</script>

</body>
</html>
