<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Tee tilaus</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #1c1c1c;
      padding: 25px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00c853;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00e676;
    }

    #status {
      margin-top: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Lähetä tilaus</h1>

  <form id="orderForm">
    <input type="text" name="name" placeholder="Nimi" required>
    <input type="email" name="email" placeholder="Sähköposti" required>
    <input type="text" name="songName" placeholder="Kappaleen nimi" required>

    <select name="genre" required>
      <option value="">Valitse genre</option>
      <option>Pop</option>
      <option>Rock</option>
      <option>Rap</option>
      <option>Iskelmä</option>
      <option>Muu</option>
    </select>

    <textarea name="lyrics" rows="5" placeholder="Sanoitukset / ideat"></textarea>

    <button type="submit">Lähetä tilaus</button>
  </form>

  <div id="status"></div>
</div>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const form = e.target;
  const data = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbzHeFAKJwtLtxn9yus0tm8ZXQoVqtUB4H5IB9wSzifZ_BlYfwT0M4VGq8W08oM8zh3M/exec", {
    method: "POST",
    body: data
  })
  .then(response => response.text())
  .then(result => {
    document.getElementById("status").innerText = "Tilaus lähetetty!";
    form.reset();
  })
  .catch(error => {
    document.getElementById("status").innerText = "Virhe lähetyksessä.";
    console.error(error);
  });
});
</script>

</body>
</html>
